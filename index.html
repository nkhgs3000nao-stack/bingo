<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダイスビンゴ スコアシート</title>
<style>
  :root {
    --felt: #0f2e1f;
    --felt-2: #163d29;
    --felt-3: #1e4d33;
    --cream: #f6ecd9;
    --cream-2: #ece0c0;
    --ink: #24321f;
    --ink-soft: #4a5a3f;
    --brass: #d4a53d;
    --brass-light: #e8c268;
    --brass-dark: #8f6a1f;
    --burgundy: #8c2f3a;
    --burgundy-light: #b6495a;
    --text-light: #f1f5ea;
    --text-muted: #9fb89f;
    --border-line: #3a5c44;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
    background: var(--felt);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212,165,61,0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(212,165,61,0.05), transparent 40%);
    color: var(--text-light);
    min-height: 100vh;
    padding: 16px;
  }

  header {
    text-align: center;
    padding: 18px 0 22px;
  }

  header h1 {
    font-size: 1.9rem;
    font-weight: 700;
    color: var(--brass-light);
    letter-spacing: 0.06em;
  }

  header p {
    color: var(--text-muted);
    font-size: 0.82rem;
    margin-top: 6px;
  }

  .game-area {
    max-width: 560px;
    margin: 0 auto;
  }

  .round-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .round-tab {
    padding: 8px 28px;
    border-radius: 24px;
    border: 1.5px solid var(--border-line);
    background: var(--felt-2);
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .round-tab.active {
    background: var(--brass);
    border-color: var(--brass);
    color: #241a05;
  }

  .grid-wrapper {
    display: grid;
    grid-template-columns: 48px repeat(5, 1fr) 48px;
    grid-template-rows: 48px repeat(5, 1fr);
    gap: 5px;
    margin-bottom: 8px;
  }

  .badge {
    background: var(--felt-3);
    border: 1px solid var(--brass-dark);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2px;
    text-align: center;
  }

  .badge .score-val {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--brass-light);
    line-height: 1.1;
    min-height: 1.2em;
  }

  .badge .score-lbl {
    color: var(--text-muted);
    font-size: 0.58rem;
    line-height: 1.1;
  }

  .diag { grid-row: 1; }
  #diag-tl { grid-column: 1; }
  #diag-tr { grid-column: 7; }

  .col-badge { grid-row: 1; }
  #col-badge-0 { grid-column: 2; }
  #col-badge-1 { grid-column: 3; }
  #col-badge-2 { grid-column: 4; }
  #col-badge-3 { grid-column: 5; }
  #col-badge-4 { grid-column: 6; }

  .row-badge { grid-column: 7; }
  #row-badge-0 { grid-row: 2; }
  #row-badge-1 { grid-row: 3; }
  #row-badge-2 { grid-row: 4; }
  #row-badge-3 { grid-row: 5; }
  #row-badge-4 { grid-row: 6; }

  .main-grid {
    grid-column: 2 / 7;
    grid-row: 2 / 7;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 5px;
  }

  .cell {
    aspect-ratio: 1;
    background: var(--cream);
    border: 2px solid var(--cream-2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .cell input {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    color: var(--ink);
    cursor: pointer;
    padding: 0;
    font-variant-numeric: tabular-nums;
  }

  .cell input::placeholder {
    color: var(--ink-soft);
    opacity: 0.35;
  }

  .cell.filled {
    border-color: var(--brass);
    box-shadow: 0 0 0 2px rgba(212,165,61,0.25) inset;
  }

  .calc-btn {
    display: block;
    width: 100%;
    padding: 15px;
    background: var(--brass);
    border: none;
    border-radius: var(--radius);
    color: #241a05;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.2s, transform 0.1s;
    margin: 18px 0 12px;
  }

  .calc-btn:hover { background: var(--brass-light); }
  .calc-btn:active { transform: scale(0.98); }

  .reset-btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1.5px solid var(--border-line);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-size: 0.88rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-bottom: 24px;
  }

  .reset-btn:hover { border-color: var(--burgundy-light); color: var(--burgundy-light); }

  .totals-section {
    background: var(--felt-2);
    border: 1px solid var(--border-line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .totals-section h2 {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .totals-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .total-card {
    background: var(--felt-3);
    border-radius: var(--radius);
    padding: 10px;
    text-align: center;
  }

  .total-card .t-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    display: block;
    margin-bottom: 4px;
  }

  .total-card .t-value {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--brass-light);
  }

  .total-card.highlight {
    background: rgba(140,47,58,0.35);
    border: 1px solid var(--burgundy);
  }

  .total-card.highlight .t-value {
    font-size: 2rem;
    color: var(--burgundy-light);
  }

  .rules-section {
    background: var(--felt-2);
    border: 1px solid var(--border-line);
    border-radius: 12px;
    padding: 16px;
    margin-top: 8px;
  }

  .rules-section h2 {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .rules-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .rule-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 8px;
    background: var(--felt-3);
    border-radius: 6px;
    font-size: 0.76rem;
  }

  .rule-row .r-name { color: var(--text-muted); }
  .rule-row .r-pts {
    font-weight: 700;
    color: var(--brass-light);
    font-size: 0.88rem;
  }

  .hint-text {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 6px;
  }

  @media (max-width: 400px) {
    header h1 { font-size: 1.5rem; }
    .cell input { font-size: 1.5rem; }
    .badge .score-val { font-size: 0.95rem; }
  }
</style>
</head>
<body>

<header>
  <h1>ダイスビンゴ</h1>
  <p>マスに数字を入力してCalculationを押すと得点が計算されます</p>
</header>

<div class="game-area">
  <div class="round-tabs">
    <button class="round-tab active" id="tab1" onclick="switchRound(1)">第1回</button>
    <button class="round-tab" id="tab2" onclick="switchRound(2)">第2回</button>
  </div>

  <div class="grid-wrapper">
    <div class="badge diag" id="diag-tl">
      <span class="score-val" id="diagTLVal"></span>
      <span class="score-lbl">斜め↘</span>
    </div>
    <div class="badge col-badge" id="col-badge-0"><span class="score-val" id="col0"></span><span class="score-lbl">列1</span></div>
    <div class="badge col-badge" id="col-badge-1"><span class="score-val" id="col1"></span><span class="score-lbl">列2</span></div>
    <div class="badge col-badge" id="col-badge-2"><span class="score-val" id="col2"></span><span class="score-lbl">列3</span></div>
    <div class="badge col-badge" id="col-badge-3"><span class="score-val" id="col3"></span><span class="score-lbl">列4</span></div>
    <div class="badge col-badge" id="col-badge-4"><span class="score-val" id="col4"></span><span class="score-lbl">列5</span></div>
    <div class="badge diag" id="diag-tr">
      <span class="score-val" id="diagTRVal"></span>
      <span class="score-lbl">斜め↙</span>
    </div>

    <div class="main-grid" id="mainGrid"></div>

    <div class="badge row-badge" id="row-badge-0"><span class="score-val" id="row0"></span><span class="score-lbl">行1</span></div>
    <div class="badge row-badge" id="row-badge-1"><span class="score-val" id="row1"></span><span class="score-lbl">行2</span></div>
    <div class="badge row-badge" id="row-badge-2"><span class="score-val" id="row2"></span><span class="score-lbl">行3</span></div>
    <div class="badge row-badge" id="row-badge-3"><span class="score-val" id="row3"></span><span class="score-lbl">行4</span></div>
    <div class="badge row-badge" id="row-badge-4"><span class="score-val" id="row4"></span><span class="score-lbl">行5</span></div>
  </div>

  <p class="hint-text">※ 斜めは2列分としてカウント（上の得点は一度計算すると保持されます）</p>

  <button class="calc-btn" onclick="calculate()">Calculation</button>
  <button class="reset-btn" onclick="resetCurrent()">このラウンドをリセット</button>

  <div class="totals-section">
    <h2>スコア集計</h2>
    <div class="totals-grid">
      <div class="total-card">
        <span class="t-label">第1回 合計</span>
        <span class="t-value" id="total1">—</span>
      </div>
      <div class="total-card">
        <span class="t-label">第2回 合計</span>
        <span class="t-value" id="total2">—</span>
      </div>
      <div class="total-card highlight">
        <span class="t-label">トータル</span>
        <span class="t-value" id="totalAll">—</span>
      </div>
    </div>
  </div>

  <div class="rules-section">
    <h2>役と得点</h2>
    <div class="rules-grid">
      <div class="rule-row"><span class="r-name">1ペア</span><span class="r-pts">1点</span></div>
      <div class="rule-row"><span class="r-name">2ペア</span><span class="r-pts">3点</span></div>
      <div class="rule-row"><span class="r-name">3カード</span><span class="r-pts">3点</span></div>
      <div class="rule-row"><span class="r-name">4カード</span><span class="r-pts">6点</span></div>
      <div class="rule-row"><span class="r-name">5カード</span><span class="r-pts">10点</span></div>
      <div class="rule-row"><span class="r-name">フルハウス</span><span class="r-pts">8点</span></div>
      <div class="rule-row"><span class="r-name">ストレート(7あり)</span><span class="r-pts">8点</span></div>
      <div class="rule-row"><span class="r-name">ストレート(7なし)</span><span class="r-pts">12点</span></div>
    </div>
  </div>
</div>

<script>
const roundData = { 1: Array(25).fill(''), 2: Array(25).fill('') };
const roundScores = { 1: null, 2: null };
const roundTotals = { 1: null, 2: null };
let currentRound = 1;

function buildGrid() {
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 25; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = 'cell-' + i;
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.inputMode = 'numeric';
    inp.maxLength = 2;
    inp.placeholder = '00';
    inp.value = roundData[currentRound][i] || '';
    inp.addEventListener('input', e => {
      let v = e.target.value.replace(/[^0-9]/g, '').slice(0, 2);
      e.target.value = v;
      roundData[currentRound][i] = v;
      cell.className = v ? 'cell filled' : 'cell';
    });
    if (roundData[currentRound][i]) cell.className = 'cell filled';
    cell.appendChild(inp);
    grid.appendChild(cell);
  }
}

function getGrid() {
  const vals = [];
  for (let i = 0; i < 25; i++) {
    const v = roundData[currentRound][i];
    vals.push(v === '' || v === undefined ? null : parseInt(v, 10));
  }
  return vals;
}

function scoreHand(arr) {
  if (arr.some(v => v === null || isNaN(v))) return { pts: 0, complete: false };

  const sorted = [...arr].sort((a, b) => a - b);
  const freq = {};
  arr.forEach(v => freq[v] = (freq[v] || 0) + 1);
  const counts = Object.values(freq).sort((a, b) => b - a);

  if (counts[0] === 5) return { pts: 10, complete: true };

  const isStr = sorted[4] - sorted[0] === 4 && new Set(sorted).size === 5;
  if (isStr) {
    return arr.includes(7) ? { pts: 8, complete: true } : { pts: 12, complete: true };
  }

  if (counts[0] === 4) return { pts: 6, complete: true };
  if (counts[0] === 3 && counts[1] === 2) return { pts: 8, complete: true };
  if (counts[0] === 3) return { pts: 3, complete: true };
  if (counts[0] === 2 && counts[1] === 2) return { pts: 3, complete: true };
  if (counts[0] === 2) return { pts: 1, complete: true };
  return { pts: 0, complete: true };
}

function calculate() {
  const vals = getGrid();
  if (vals.includes(null)) {
    alert('全てのマスに数字を入力してください。');
    return;
  }

  const scores = { cols: [], rows: [], diagTL: 0, diagTR: 0 };
  let total = 0;

  for (let c = 0; c < 5; c++) {
    const col = [0,1,2,3,4].map(r => vals[r*5+c]);
    const s = scoreHand(col);
    scores.cols.push(s.pts);
    total += s.pts;
  }

  for (let r = 0; r < 5; r++) {
    const row = [0,1,2,3,4].map(c => vals[r*5+c]);
    const s = scoreHand(row);
    scores.rows.push(s.pts);
    total += s.pts;
  }

  const diagTL = [0,1,2,3,4].map(i => vals[i*5+i]);
  const sTL = scoreHand(diagTL);
  scores.diagTL = sTL.pts;
  total += sTL.pts;

  const diagTR = [0,1,2,3,4].map(i => vals[i*5+(4-i)]);
  const sTR = scoreHand(diagTR);
  scores.diagTR = sTR.pts;
  total += sTR.pts;

  roundScores[currentRound] = scores;
  roundTotals[currentRound] = total;

  renderScores(scores);
  document.getElementById('total' + currentRound).textContent = total + '点';
  updateGrandTotal();
}

function renderScores(scores) {
  if (!scores) {
    clearScoreDisplay();
    return;
  }
  for (let c = 0; c < 5; c++) document.getElementById('col' + c).textContent = scores.cols[c];
  for (let r = 0; r < 5; r++) document.getElementById('row' + r).textContent = scores.rows[r];
  document.getElementById('diagTLVal').textContent = scores.diagTL;
  document.getElementById('diagTRVal').textContent = scores.diagTR;
}

function clearScoreDisplay() {
  for (let c = 0; c < 5; c++) document.getElementById('col' + c).textContent = '';
  for (let r = 0; r < 5; r++) document.getElementById('row' + r).textContent = '';
  document.getElementById('diagTLVal').textContent = '';
  document.getElementById('diagTRVal').textContent = '';
}

function updateGrandTotal() {
  const t1 = roundTotals[1];
  const t2 = roundTotals[2];
  if (t1 !== null && t2 !== null) {
    document.getElementById('totalAll').textContent = (t1 + t2) + '点';
  } else if (t1 !== null) {
    document.getElementById('totalAll').textContent = t1 + '点';
  } else if (t2 !== null) {
    document.getElementById('totalAll').textContent = t2 + '点';
  } else {
    document.getElementById('totalAll').textContent = '—';
  }
}

function switchRound(n) {
  currentRound = n;
  document.getElementById('tab1').className = 'round-tab' + (n === 1 ? ' active' : '');
  document.getElementById('tab2').className = 'round-tab' + (n === 2 ? ' active' : '');
  buildGrid();
  renderScores(roundScores[currentRound]);
}

function resetCurrent() {
  if (!confirm('このラウンドのデータをリセットしますか？')) return;
  roundData[currentRound] = Array(25).fill('');
  roundScores[currentRound] = null;
  roundTotals[currentRound] = null;
  document.getElementById('total' + currentRound).textContent = '—';
  updateGrandTotal();
  buildGrid();
  clearScoreDisplay();
}

buildGrid();
</script>
</body>
</html>
