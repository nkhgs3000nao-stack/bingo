<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ビンゴカード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans JP', sans-serif;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* カード外枠 */
    .card {
      width: 100%;
      background: linear-gradient(160deg, #ff8c00, #ffb347);
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.12);
      border: 4px solid #fff;
      position: relative;
    }

    /* デコレーション星 */
    .stars {
      text-align: center;
      font-size: 18px;
      margin-bottom: 2px;
      letter-spacing: 4px;
    }

    /* BINGOタイトル */
    .bingo-title {
      text-align: center;
      font-family: 'Boogaloo', cursive;
      font-size: clamp(3rem, 16vw, 4.5rem);
      letter-spacing: 0.15em;
      line-height: 1;
      margin-bottom: 8px;
      -webkit-text-stroke: 3px #c8000a;
      color: #ff1a1a;
      text-shadow: 3px 3px 0 #7a0000, 0 0 20px rgba(255,100,0,0.3);
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    /* グリッドヘッダー */
    .grid-header {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      margin-bottom: 4px;
    }
    .col-label {
      background: #fff;
      border-radius: 8px;
      text-align: center;
      font-family: 'Boogaloo', cursive;
      font-size: clamp(1.3rem, 5.5vw, 1.8rem);
      color: #cc0000;
      padding: 4px 2px;
      font-weight: bold;
    }

    /* グリッド */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }

    .cell {
      aspect-ratio: 1;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Boogaloo', cursive;
      font-size: clamp(1.2rem, 5.5vw, 1.7rem);
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      transition: transform 0.12s, background 0.15s;
      border: 2px solid rgba(0,0,0,0.08);
    }

    .cell-empty {
      background: #ffe0b2;
      color: #ccc;
      cursor: default;
    }

    .cell-unset {
      background: #fff;
      color: #222;
    }
    .cell-unset:hover {
      transform: scale(1.07);
      background: #fff9c4;
    }
    .cell-unset:active { transform: scale(0.94); }

    .cell-hit {
      background: linear-gradient(135deg, #ff6600, #ff9900);
      color: #fff;
      border-color: #cc4400;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15);
    }
    .cell-hit:active { transform: scale(0.94); }

    .cell-free {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #7a4000;
      border-color: #cc8800;
      font-size: clamp(0.65rem, 2.8vw, 0.85rem);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 900;
      cursor: default;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15);
    }

    .cell-bingo {
      background: linear-gradient(135deg, #e53935, #ff6f00);
      color: #fff;
      border-color: #b71c1c;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      box-shadow: 0 0 12px rgba(255,80,0,0.5), inset 0 -3px 0 rgba(0,0,0,0.15);
      animation: cellPulse 1.5s ease-in-out infinite alternate;
    }
    @keyframes cellPulse {
      from { box-shadow: 0 0 8px rgba(255,80,0,0.4); }
      to   { box-shadow: 0 0 18px rgba(255,80,0,0.8); }
    }

    /* ステータス */
    .status-area {
      width: 100%;
      margin-top: 14px;
    }

    .status-box {
      border-radius: 14px;
      padding: 12px 16px;
      text-align: center;
      font-weight: 900;
      font-size: clamp(1rem, 4.5vw, 1.3rem);
      letter-spacing: 0.05em;
      transition: all 0.3s;
    }

    .status-waiting {
      background: #fff;
      color: #999;
      border: 2px dashed #ddd;
    }

    .status-active {
      background: #fff;
      color: #555;
      border: 2px solid #ddd;
      font-size: clamp(0.85rem, 3.5vw, 1rem);
    }

    .status-bingo {
      background: linear-gradient(135deg, #ff6f00, #e53935);
      color: #fff;
      border: 3px solid #FFD700;
      box-shadow: 0 0 24px rgba(255,180,0,0.6);
      animation: statusPulse 1s ease-in-out infinite alternate;
      font-family: 'Boogaloo', cursive;
      font-size: clamp(1.6rem, 7vw, 2.2rem);
      letter-spacing: 0.1em;
    }
    @keyframes statusPulse {
      from { box-shadow: 0 0 16px rgba(255,180,0,0.5); }
      to   { box-shadow: 0 0 36px rgba(255,180,0,0.9); }
    }

    /* ロック済み表示 */
    .locked-notice {
      width: 100%;
      margin-top: 10px;
      background: #fff3e0;
      border: 2px solid #ffb74d;
      border-radius: 12px;
      padding: 10px 14px;
      text-align: center;
      color: #e65100;
      font-size: 0.82rem;
      font-weight: 700;
    }

    /* スタートボタン */
    .start-btn {
      margin-top: 16px;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #1565c0, #1e88e5);
      color: #fff;
      font-family: 'Boogaloo', cursive;
      font-size: clamp(1.2rem, 5.5vw, 1.6rem);
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow: 0 4px 0 #0d3b7a, 0 6px 16px rgba(0,0,0,0.18);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .start-btn:hover { transform: translateY(-2px); }
    .start-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0d3b7a, 0 3px 8px rgba(0,0,0,0.18);
    }

    /* 紙吹雪 */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(105vh) rotate(600deg); opacity: 0; }
    }

    /* ビンゴバースト */
    .burst-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
    }
    .burst-ring {
      position: absolute;
      width: 260px; height: 260px;
      border-radius: 50%;
      border: 10px solid #FFD700;
      animation: ringExpand 0.7s ease-out forwards;
    }
    @keyframes ringExpand {
      from { transform: scale(0.2); opacity: 1; }
      to   { transform: scale(3.5); opacity: 0; }
    }
    .burst-text {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(3rem, 16vw, 6rem);
      color: #FFD700;
      -webkit-text-stroke: 3px #cc8800;
      text-shadow: 0 0 30px #FFD700, 0 4px 0 #8a5c00;
      letter-spacing: 0.05em;
      text-align: center;
      z-index: 1;
      animation: textPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes textPop {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* 画面揺れ */
    .shake { animation: shakeX 0.5s ease-in-out; }
    @keyframes shakeX {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
  </style>
</head>
<body>

<div class="confetti-wrap" id="confettiWrap"></div>

<div class="app" id="app">
  <div class="card" id="card">
    <div class="stars">⭐ 🌟 ⭐ 🌟 ⭐</div>
    <div class="bingo-title">BINGO</div>

    <div class="grid-header">
      <div class="col-label">B</div>
      <div class="col-label">I</div>
      <div class="col-label">N</div>
      <div class="col-label">G</div>
      <div class="col-label">O</div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div class="status-area">
    <div class="status-box status-waiting" id="statusBox">
      ボタンを押してスタート！
    </div>
  </div>

  <div id="lockedNotice" class="locked-notice" style="display:none;">
    🔒 このカードは確定済みです。数字の変更はできません。
  </div>

  <button class="start-btn" id="startBtn" onclick="startBingo()">
    🎲 ビンゴカードを作る
  </button>
</div>

<script>
  const SIZE = 5;
  const CENTER = 2;
  const STORAGE_KEY = 'bingo_card_v1';

  let grid = null;
  let prevBingoCount = 0;
  let bingoCount = 0;
  let isLocked = false;

  // 起動時：保存済みカードがあれば読み込む
  window.addEventListener('load', function() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const data = JSON.parse(saved);
        grid = data.grid;
        prevBingoCount = data.prevBingoCount || 0;
        bingoCount = countBingos();
        isLocked = true;
        lockCard();
        renderGrid();
        updateStatus();
      } catch(e) {
        localStorage.removeItem(STORAGE_KEY);
      }
    }
  });

  function startBingo() {
    if (isLocked) return;

    const nums = new Set();
    while (nums.size < SIZE * SIZE - 1) {
      nums.add(Math.floor(Math.random() * 99) + 1);
    }
    const arr = [...nums];
    let idx = 0;
    grid = [];
    for (let r = 0; r < SIZE; r++) {
      grid[r] = [];
      for (let c = 0; c < SIZE; c++) {
        if (r === CENTER && c === CENTER) {
          grid[r][c] = { num: null, hit: true, free: true };
        } else {
          grid[r][c] = { num: arr[idx++], hit: false, free: false };
        }
      }
    }
    prevBingoCount = 0;
    bingoCount = 0;
    isLocked = true;

    saveCard();
    lockCard();
    renderGrid();
    updateStatus();
  }

  function lockCard() {
    const btn = document.getElementById('startBtn');
    btn.style.display = 'none';
    document.getElementById('lockedNotice').style.display = 'block';
  }

  function saveCard() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      grid: grid,
      prevBingoCount: prevBingoCount
    }));
  }

  function tapCell(r, c) {
    if (!grid) return;
    const cell = grid[r][c];
    if (cell.free) return;
    grid[r][c].hit = !grid[r][c].hit;
    bingoCount = countBingos();
    if (bingoCount > prevBingoCount) {
      prevBingoCount = bingoCount;
      showBurst();
      fireConfetti();
      shakeApp();
    }
    saveCard();
    renderGrid();
    updateStatus();
  }

  function getLines() {
    const lines = [];
    for (let r = 0; r < SIZE; r++) lines.push([[r,0],[r,1],[r,2],[r,3],[r,4]]);
    for (let c = 0; c < SIZE; c++) lines.push([[0,c],[1,c],[2,c],[3,c],[4,c]]);
    lines.push([[0,0],[1,1],[2,2],[3,3],[4,4]]);
    lines.push([[0,4],[1,3],[2,2],[3,1],[4,0]]);
    return lines;
  }

  function countBingos() {
    if (!grid) return 0;
    return getLines().filter(line => line.every(([r,c]) => grid[r][c].hit)).length;
  }

  function getBingoCells() {
    const set = new Set();
    getLines().forEach(line => {
      if (line.every(([r,c]) => grid[r][c].hit))
        line.forEach(([r,c]) => set.add(r+'-'+c));
    });
    return set;
  }

  function renderGrid() {
    const el = document.getElementById('grid');
    el.innerHTML = '';
    const bingoCells = grid ? getBingoCells() : new Set();

    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const div = document.createElement('div');
        div.className = 'cell';

        if (!grid) {
          div.classList.add('cell-empty');
          div.textContent = '?';
        } else {
          const cell = grid[r][c];
          if (cell.free) {
            div.classList.add('cell-free');
            div.textContent = 'FREE';
          } else if (bingoCells.has(r+'-'+c)) {
            div.classList.add('cell-bingo');
            div.textContent = cell.num;
            div.onclick = () => tapCell(r, c);
          } else if (cell.hit) {
            div.classList.add('cell-hit');
            div.textContent = cell.num;
            div.onclick = () => tapCell(r, c);
          } else {
            div.classList.add('cell-unset');
            div.textContent = cell.num;
            div.onclick = () => tapCell(r, c);
          }
        }
        el.appendChild(div);
      }
    }
  }

  function updateStatus() {
    const el = document.getElementById('statusBox');
    if (!grid) {
      el.className = 'status-box status-waiting';
      el.textContent = 'ボタンを押してスタート！';
    } else if (bingoCount > 0) {
      el.className = 'status-box status-bingo';
      el.textContent = bingoCount === 1 ? '🎉 BINGO!!!' : '🎉 BINGO × ' + bingoCount;
    } else {
      el.className = 'status-box status-active';
      el.textContent = '✦ 司会者が読んだ数字をタップしよう';
    }
  }

  function showBurst() {
    const overlay = document.createElement('div');
    overlay.className = 'burst-overlay';
    const ring = document.createElement('div');
    ring.className = 'burst-ring';
    const text = document.createElement('div');
    text.className = 'burst-text';
    text.textContent = bingoCount === 1 ? 'BINGO!!!' : 'BINGO × ' + bingoCount;
    overlay.appendChild(ring);
    overlay.appendChild(text);
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 1600);
  }

  function fireConfetti() {
    const wrap = document.getElementById('confettiWrap');
    wrap.innerHTML = '';
    const colors = ['#FFD700','#FF4444','#44BB44','#4488FF','#FF88FF','#FF8800'];
    for (let i = 0; i < 40; i++) {
      const d = document.createElement('div');
      d.className = 'confetti-piece';
      const size = 7 + Math.random() * 9;
      d.style.cssText =
        'left:' + (Math.random()*100) + '%;' +
        'background:' + colors[i % colors.length] + ';' +
        'animation-duration:' + (1.0 + Math.random()*1.2) + 's;' +
        'animation-delay:' + (Math.random()*0.5) + 's;' +
        'width:' + size + 'px;height:' + size + 'px;';
      wrap.appendChild(d);
    }
    setTimeout(() => { wrap.innerHTML = ''; }, 2800);
  }

  function shakeApp() {
    const app = document.getElementById('app');
    app.classList.add('shake');
    setTimeout(() => app.classList.remove('shake'), 600);
  }

  renderGrid();
</script>
</body>
</html>
